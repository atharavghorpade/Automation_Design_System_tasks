name: CI-CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'src/main/java/org/example/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/main/java/org/example/**'

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: dev-cluster

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t dhairyashil8416/cicd:latest .

  push:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t dhairyashil8416/cicd:latest .

      - name: Push Docker Image
        run: docker push dhairyashil8416/cicd:latest

  deploy:
    needs: push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Verify AWS Identity
        run: |
          echo "=== Verifying AWS Identity ==="
          IAM_ARN=$(aws sts get-caller-identity --query Arn --output text)
          echo "IAM User/Role: $IAM_ARN"
          echo ""
          echo "=== Checking EKS Cluster Access ==="
          if ! aws eks describe-cluster --name dev-cluster --region ap-south-1 > /dev/null 2>&1; then
            echo "ERROR: Cannot access EKS cluster"
            echo "Please ensure IAM user has 'eks:DescribeCluster' permission"
            exit 1
          fi
          echo "✓ EKS cluster accessible"
          echo ""
          echo "If kubectl fails in next steps, add this ARN to aws-auth ConfigMap:"
          echo "  $IAM_ARN"

      - name: Update kubeconfig
        run: |
          echo "=== Updating kubeconfig ==="
          aws eks update-kubeconfig --name dev-cluster --region ap-south-1 --alias dev-cluster
          echo "✓ Kubeconfig updated"

      - name: Test kubectl Access
        continue-on-error: true
        id: kubectl_test
        run: |
          echo "=== Testing kubectl access ==="
          if kubectl get nodes > /dev/null 2>&1; then
            echo "✓ kubectl authentication successful"
            exit 0
          else
            echo "kubectl cannot authenticate - IAM user not in aws-auth ConfigMap"
            echo ""
            echo "SOLUTION: Run this locally with cluster admin access:"
            echo "  kubectl edit configmap aws-auth -n kube-system"
            echo ""
            echo "Add under 'mapUsers:':"
            IAM_ARN=$(aws sts get-caller-identity --query Arn --output text)
            echo "  - userarn: $IAM_ARN"
            echo "    username: github-actions"
            echo "    groups:"
            echo "      - system:masters"
            echo ""
            echo "See SOLUTION.md in the repository for detailed instructions"
            exit 1
          fi

      - name: Deploy to Kubernetes
        if: steps.kubectl_test.outcome == 'success'
        run: |
          echo "=== Deploying to Kubernetes ==="
          sed -i 's|IMAGE_TAG|dhairyashil8416/cicd:latest|g' deployment.yaml
          kubectl apply -f deployment.yaml
          echo ""
          echo "=== Waiting for Deployment ==="
          kubectl rollout status deployment/automation-design-system --timeout=5m
          echo ""
          echo "=== Deployment Status ==="
          kubectl get pods -l app=automation-design-system
          kubectl get svc automation-design-system 