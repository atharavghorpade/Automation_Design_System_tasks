name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: dev-cluster

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Java environment
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Build Maven project
      - name: Build Project
        run: mvn clean package

      # Run the system to generate compliance artifacts
      - name: Run Compliance System
        run: mvn exec:java -Dexec.mainClass="org.example.Main"

      # Upload generated artifacts
      - name: Upload Compliance Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compliance-artifacts
          path: output/artifacts

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker image
      - name: Build Docker Image
        run: docker build -t dhairyashil8416/cicd:latest .

      # Push Docker image
      - name: Push Docker Image
        run: docker push dhairyashil8416/cicd:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Verify AWS identity
      - name: Verify AWS Identity
        run: |
          echo "=== Verifying AWS Identity ==="
          IAM_ARN=$(aws sts get-caller-identity --query Arn --output text)
          echo "IAM User/Role: $IAM_ARN"

      # Update kubeconfig
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

      # Test kubectl access
      - name: Test kubectl Access
        run: kubectl get nodes

      # Deploy application
      - name: Deploy to Kubernetes
        run: |
          echo "=== Deploying to Kubernetes ==="
          sed -i 's|IMAGE_TAG|dhairyashil8416/cicd:latest|g' deployment.yaml
          kubectl apply -f deployment.yaml

          echo "=== Waiting for Deployment ==="
          kubectl rollout status deployment/automation-design-system --timeout=5m

          echo "=== Deployment Status ==="
          kubectl get pods -l app=automation-design-system
          kubectl get svc automation-design-system