name: CI-CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'src/main/java/org/example/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/main/java/org/example/**'

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: dev-cluster

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Java environment
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      # Build Maven project
      - name: Build Project
        run: mvn clean package

      # Run the system to generate compliance artifacts
      - name: Run Compliance System
        run: mvn exec:java -Dexec.mainClass="org.example.Main"

      # Upload generated artifacts
      - name: Upload Compliance Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compliance-artifacts
          path: output/artifacts

      # Upload target directory for Docker build
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/

  push:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Download build artifacts
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: target/

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker image
      - name: Build Docker Image
        run: docker build -t dhairyashil8416/cicd:latest .

      # Push Docker image
      - name: Push Docker Image
        run: docker push dhairyashil8416/cicd:latest

  deploy:
    needs: push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Verify AWS identity
      - name: Verify AWS Identity
        run: |
          echo "=== Verifying AWS Identity ==="
          IAM_ARN=$(aws sts get-caller-identity --query Arn --output text)
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "IAM User/Role: $IAM_ARN"
          echo "Account ID: $ACCOUNT_ID"
          echo "IAM_ARN=$IAM_ARN" >> $GITHUB_ENV

      # Grant EKS access using Access Entry (EKS API)
      - name: Grant EKS Access
        continue-on-error: true
        id: grant-access
        run: |
          echo "=== Granting EKS Access to IAM User ==="
          
          # Try to create access entry (ignore if already exists)
          aws eks create-access-entry \
            --cluster-name $CLUSTER_NAME \
            --principal-arn ${{ env.IAM_ARN }} \
            --type STANDARD \
            --region $AWS_REGION 2>/dev/null || echo "Access entry may already exist"
          
          # Associate admin policy
          aws eks associate-access-policy \
            --cluster-name $CLUSTER_NAME \
            --principal-arn ${{ env.IAM_ARN }} \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster \
            --region $AWS_REGION 2>/dev/null || echo "Policy may already be associated"
          
          echo "✓ EKS access granted, waiting for propagation..."
          sleep 15

      # Update kubeconfig
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

      # Test kubectl access
      - name: Test kubectl Access
        id: test-kubectl
        run: |
          if kubectl get nodes; then
            echo "✓ Successfully connected to EKS cluster"
          else
            echo "Cannot connect to EKS cluster"
            echo ""
            echo "================================================================"
            echo "ERROR: IAM user does not have access to the EKS cluster"
            echo "================================================================"
            echo ""
            echo "SOLUTION - Run ONE of these commands from your local machine:"
            echo ""
            echo "Option 1: Add IAM user to cluster (Quickest)"
            echo "---------------------------------------------------"
            echo "kubectl edit configmap aws-auth -n kube-system"
            echo ""
            echo "Then add your IAM user ARN (${{ env.IAM_ARN }}) under mapUsers:"
            echo ""
            echo "mapUsers: |"
            echo "  - userarn: ${{ env.IAM_ARN }}"
            echo "    username: github-actions"
            echo "    groups:"
            echo "      - system:masters"
            echo ""
            echo "Option 2: Use EKS Access Entry (EKS 1.23+)"
            echo "---------------------------------------------------"
            echo "aws eks create-access-entry \\"
            echo "  --cluster-name $CLUSTER_NAME \\"
            echo "  --principal-arn ${{ env.IAM_ARN }} \\"
            echo "  --type STANDARD \\"
            echo "  --region $AWS_REGION"
            echo ""
            echo "aws eks associate-access-policy \\"
            echo "  --cluster-name $CLUSTER_NAME \\"
            echo "  --principal-arn ${{ env.IAM_ARN }} \\"
            echo "  --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \\"
            echo "  --access-scope type=cluster \\"
            echo "  --region $AWS_REGION"
            echo ""
            echo "See EKS-FIX-GUIDE.md for detailed instructions"
            echo "================================================================"
            exit 1
          fi

      # Deploy application
      - name: Deploy to Kubernetes
        run: |
          echo "=== Deploying to Kubernetes ==="
          sed -i 's|IMAGE_TAG|dhairyashil8416/cicd:latest|g' deployment.yaml
          kubectl apply -f deployment.yaml
          
          echo ""
          echo "=== Deployment Applied ==="
          kubectl get deployment automation-design-system
          
          echo ""
          echo "=== Waiting for Deployment (10 minutes timeout) ==="
          if kubectl rollout status deployment/automation-design-system --timeout=10m; then
            echo ""
            echo "=== ✓ Deployment Successful ==="
            kubectl get pods -l app=automation-design-system
            echo ""
            echo "=== Application Logs (last 30 lines) ==="
            POD_NAME=$(kubectl get pods -l app=automation-design-system -o jsonpath='{.items[0].metadata.name}')
            kubectl logs $POD_NAME --tail=30
          else
            echo ""
            echo "=== ❌ Deployment Failed - Debugging Information ==="
            echo ""
            echo "--- Deployment Description ---"
            kubectl describe deployment automation-design-system
            echo ""
            echo "--- Pod Status ---"
            kubectl get pods -l app=automation-design-system
            echo ""
            echo "--- Pod Details ---"
            kubectl describe pods -l app=automation-design-system
            echo ""
            echo "--- Pod Logs (last 50 lines) ---"
            POD_NAME=$(kubectl get pods -l app=automation-design-system -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
            if [ -n "$POD_NAME" ]; then
              echo "Logs from pod: $POD_NAME"
              kubectl logs $POD_NAME --tail=50 || echo "Could not fetch logs"
            else
              echo "No pods found"
            fi
            echo ""
            echo "=== Troubleshooting Tips ==="
            echo "1. Check if the Docker image exists: docker pull dhairyashil8416/cicd:latest"
            echo "2. Verify your cluster has enough resources"
            echo "3. Check pod events above for specific error messages"
            exit 1
          fi