name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: dev-cluster

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t dhairyashil8416/cicd:latest .

      - name: Push Docker Image
        run: docker push dhairyashil8416/cicd:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Verify AWS Identity
        run: |
          echo "Verifying AWS identity..."
          aws sts get-caller-identity
          echo "Checking EKS cluster access..."
          aws eks describe-cluster --name dev-cluster --region ap-south-1 || echo "Cannot access cluster - check IAM permissions"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name dev-cluster --region ap-south-1 --alias dev-cluster
          export KUBECONFIG=~/.kube/config
          echo "Kubeconfig updated successfully"

      - name: Deploy to Kubernetes
        run: |
          sed -i 's|IMAGE_TAG|dhairyashil8416/cicd:latest|g' deployment.yaml
          kubectl apply -f deployment.yaml
          kubectl rollout status deployment/automation-design-system
          kubectl get pods -l app=automation-design-system