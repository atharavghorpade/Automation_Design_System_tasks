apiVersion: apps/v1
kind: Deployment
metadata:
  name: automation-design-system
  labels:
    app: automation-design-system
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: automation-design-system
  template:
    metadata:
      labels:
        app: automation-design-system
    spec:
      containers:
      - name: automation-app
        image: IMAGE_TAG
        imagePullPolicy: Always
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        # Add readiness probe to mark pod as ready after startup
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "[ -f /app/app.jar ]"
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
        # Add liveness probe to detect if container is running
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "pgrep -f 'tail' || pgrep -f 'java'"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 2
---
# Service removed - this is a batch processing app, not a web service
# If you need to access logs, use: kubectl logs -f deployment/automation-design-system
